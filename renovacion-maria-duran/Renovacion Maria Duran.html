<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Renovación · María Durán Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3efe8;
    --bg-card: #faf7f1;
    --ink: #1a1a17;
    --ink-soft: #5a564d;
    --ink-mute: #8a8478;
    --line: #e3ddd1;
    --line-strong: #cfc8b9;
    --accent: #2f3a2c;
    --accent-soft: #5a6b54;
    --warm: #c8765a;
    --gold: #b8924a;
    --done: #2f3a2c;
    --lock: #8a8478;
    --serif: 'Instrument Serif', 'Times New Roman', serif;
    --sans: 'Inter Tight', -apple-system, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    background-image:
      radial-gradient(circle at 12% 8%, rgba(200, 118, 90, 0.06), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(47, 58, 44, 0.05), transparent 50%);
    min-height: 100vh;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 32px; }

  /* ---- Top bar ---- */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 28px 0 0; font-size: 12px; color: var(--ink-mute);
    font-family: var(--mono); letter-spacing: 0.04em; text-transform: uppercase;
  }
  .topbar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warm); display: inline-block; margin-right: 8px; vertical-align: middle; }

  /* ---- Hero ---- */
  .hero { padding: 80px 0 64px; }
  .hero-grid {
    display: grid; grid-template-columns: 1fr auto; gap: 64px; align-items: end;
  }
  .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-mute); margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .eyebrow::before {
    content: ''; width: 24px; height: 1px; background: var(--ink-mute);
  }
  h1.title {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(56px, 7vw, 96px); line-height: 0.98; letter-spacing: -0.02em;
    color: var(--ink); text-wrap: balance;
  }
  h1.title em { font-style: italic; color: var(--accent); }
  .hero-sub {
    font-size: 18px; color: var(--ink-soft); line-height: 1.55;
    max-width: 480px; margin-top: 28px; font-weight: 400;
  }
  .client-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px 28px;
    display: flex; align-items: center; gap: 16px;
    min-width: 320px;
  }
  .client-card img {
    width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
    border: 1px solid var(--line-strong);
  }
  .client-card .meta { display: flex; flex-direction: column; gap: 2px; }
  .client-card .handle { font-weight: 500; font-size: 15px; color: var(--ink); display: flex; align-items: center; gap: 6px; }
  .client-card .name { font-size: 12px; color: var(--ink-mute); font-family: var(--mono); }
  .verified { width: 14px; height: 14px; }

  /* ---- Section header ---- */
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 40px;
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }
  .section-head .label {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-mute);
  }
  .section-head h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(32px, 4vw, 48px); line-height: 1.05; letter-spacing: -0.015em;
    max-width: 60%; text-wrap: balance;
  }
  .section-head h2 em { font-style: italic; color: var(--accent); }

  /* ---- Calendars ---- */
  .calendars { padding: 24px 0 80px; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
  }
  .cal {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 22px 22px 18px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 24px 40px -28px rgba(40, 30, 10, 0.18),
      0 4px 12px -6px rgba(40, 30, 10, 0.06);
    position: relative;
    transform: translateZ(0);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }
  .cal:hover {
    transform: translateY(-4px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 32px 50px -28px rgba(40, 30, 10, 0.22),
      0 6px 16px -6px rgba(40, 30, 10, 0.08);
  }
  .cal.locked { background: var(--bg); }
  .cal-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .cal-month {
    font-family: var(--serif); font-size: 28px; font-weight: 400;
    letter-spacing: -0.01em; color: var(--ink);
  }
  .cal.locked .cal-month { color: var(--ink-mute); }
  .cal-year { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); letter-spacing: 0.1em; }
  .cal-status {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 2px;
  }
  .cal-status.done { background: var(--accent); color: var(--bg-card); }
  .cal-status.locked { background: transparent; color: var(--ink-mute); border: 1px solid var(--line-strong); }

  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    font-family: var(--mono); font-size: 9px; color: var(--ink-mute);
    text-align: center; margin-bottom: 6px; letter-spacing: 0.05em;
  }
  .cal-days {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .day {
    aspect-ratio: 1;
    border-radius: 3px;
    background: #f0ead9;
    position: relative;
    overflow: hidden;
    display: flex; align-items: flex-end; justify-content: flex-start;
    padding: 3px;
    transition: transform 0.2s ease;
  }
  .day.empty { background: transparent; }
  .day.has-story { background-size: cover; background-position: center; }
  .day.has-story::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.55), transparent 50%);
  }
  .day .num {
    font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,0.95);
    position: relative; z-index: 1; line-height: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .day:not(.has-story):not(.empty) .num { color: var(--ink-mute); text-shadow: none; }

  /* Locked calendar overlay */
  .cal.locked .day {
    background: #ebe5d4 !important;
    background-image: none !important;
  }
  .cal.locked .day::before { display: none; }
  .cal.locked .day .num { color: rgba(138, 132, 120, 0.5); }
  .cal.locked .cal-days { filter: blur(1.5px); opacity: 0.55; }

  .cal-image {
    margin: 8px -10px 0;
    border-radius: 4px;
    background: transparent;
    mix-blend-mode: multiply;
  }
  .cal-image img {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
  }

  .lock-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .lock-icon {
    width: 48px; height: 48px;
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 8px 20px -6px rgba(40,30,10,0.18);
  }
  .lock-icon svg { width: 20px; height: 20px; color: var(--ink-soft); }

  .cal-foot {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid var(--line);
    font-family: var(--mono); font-size: 10px; color: var(--ink-mute);
    letter-spacing: 0.06em;
  }
  .cal-foot .count strong { color: var(--ink); font-weight: 500; }
  .cal.locked .cal-foot .count strong { color: var(--ink-mute); }

  /* ---- Results ---- */
  .results { padding: 80px 0; border-top: 1px solid var(--line); }
  .results-grid {
    display: grid; grid-template-columns: 1.1fr 1fr 1fr; gap: 32px;
    align-items: stretch;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 36px 32px;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 280px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 16px 32px -24px rgba(40, 30, 10, 0.14);
  }
  .stat-card.feature {
    background: var(--accent);
    color: var(--bg-card);
    border-color: var(--accent);
  }
  .stat-label {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--ink-mute);
  }
  .stat-card.feature .stat-label { color: rgba(243, 239, 232, 0.6); }
  .stat-num {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(56px, 6vw, 88px); line-height: 1;
    letter-spacing: -0.02em; color: var(--ink);
  }
  .stat-card.feature .stat-num { color: var(--bg-card); }
  .stat-num .plus { font-family: var(--sans); font-weight: 300; font-size: 0.5em; vertical-align: 0.4em; margin-right: 2px; }
  .stat-sub {
    font-size: 14px; line-height: 1.5; color: var(--ink-soft);
    max-width: 28ch;
  }
  .stat-card.feature .stat-sub { color: rgba(243, 239, 232, 0.75); }
  .stat-card.feature .stat-num em { font-style: italic; }
  .stat-record {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10px;
    color: var(--warm); letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 8px;
  }
  .stat-record::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--warm);
  }

  /* Saved-time card */
  .time-saved {
    grid-column: 1 / -1;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 32px;
    display: grid; grid-template-columns: auto 1fr; gap: 32px;
    align-items: center;
    margin-top: 20px;
  }
  .time-saved .quote-mark {
    font-family: var(--serif); font-style: italic; font-size: 96px;
    line-height: 0.6; color: var(--warm);
  }
  .time-saved p {
    font-family: var(--serif); font-size: 26px; line-height: 1.3;
    color: var(--ink); font-weight: 400; letter-spacing: -0.01em;
    text-wrap: balance;
  }
  .time-saved p em { font-style: italic; color: var(--accent); }
  .time-saved .small {
    font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
    letter-spacing: 0.1em; text-transform: uppercase; margin-top: 12px;
  }

  /* ---- Testimonial ---- */
  .testimonial { padding: 80px 0; border-top: 1px solid var(--line); }
  .testi-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
  }
  .testi-quote blockquote {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(28px, 3vw, 38px); line-height: 1.25;
    letter-spacing: -0.01em; color: var(--ink);
    text-wrap: balance;
  }
  .testi-quote blockquote em { font-style: italic; color: var(--accent); }
  .testi-quote .attr {
    margin-top: 32px; display: flex; align-items: center; gap: 12px;
    font-family: var(--mono); font-size: 12px; color: var(--ink-mute);
    letter-spacing: 0.06em;
  }
  .testi-quote .attr strong { color: var(--ink); font-weight: 500; }
  .testi-quote .attr .line { width: 24px; height: 1px; background: var(--line-strong); }

  /* WhatsApp-style proof card */
  .wa-card {
    background: #0b141a;
    border-radius: 14px;
    padding: 24px 22px 22px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 32px 60px -32px rgba(40, 30, 10, 0.35),
      0 8px 20px -8px rgba(40, 30, 10, 0.12);
    position: relative;
    transform: rotate(-1deg);
    max-width: 440px;
    margin-left: auto;
  }
  .wa-card::before {
    content: ''; position: absolute; top: -8px; left: 24px;
    width: 60px; height: 16px; background: rgba(200, 118, 90, 0.4);
    border-radius: 2px; transform: rotate(-2deg);
  }
  .wa-head {
    display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.85);
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .wa-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #c8765a, #b8924a);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; font-weight: 500;
  }
  .wa-name { font-size: 14px; font-weight: 500; color: #e9eded; }
  .wa-name span { display: block; font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 400; }
  .wa-msg {
    margin-top: 16px;
    background: #1f2c33;
    color: #e9eded;
    padding: 12px 14px;
    border-radius: 0 8px 8px 8px;
    font-size: 14px; line-height: 1.45;
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 92%;
  }
  .wa-msg .quoted {
    border-left: 3px solid #00a884;
    padding: 6px 10px;
    background: rgba(0,168,132,0.06);
    border-radius: 4px;
    margin-bottom: 8px;
    font-size: 13px;
  }
  .wa-msg .quoted strong { color: #00a884; display: block; margin-bottom: 2px; font-weight: 500; }
  .wa-msg .quoted em { font-style: normal; color: rgba(233,237,237,0.85); }
  .wa-time {
    text-align: right; font-size: 10px; color: rgba(255,255,255,0.4);
    margin-top: 6px; font-family: var(--mono);
  }
  .wa-sender {
    font-size: 12px; color: #00a884; font-weight: 500;
    margin-bottom: 4px;
  }

  /* ---- Tension ---- */
  .tension { padding: 80px 0 64px; border-top: 1px solid var(--line); text-align: center; }
  .tension h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(40px, 5vw, 64px); line-height: 1.05; letter-spacing: -0.02em;
    max-width: 18ch; margin: 0 auto 20px; text-wrap: balance;
  }
  .tension h2 em { font-style: italic; color: var(--accent); }
  .tension p {
    font-size: 17px; color: var(--ink-soft); max-width: 540px; margin: 0 auto;
    line-height: 1.55;
  }

  /* ---- CTA ---- */
  .cta { padding: 0 0 80px; text-align: center; }
  .cta-card {
    background: var(--accent);
    color: var(--bg-card);
    border-radius: 12px;
    padding: 56px 48px;
    max-width: 720px; margin: 0 auto;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 40px 80px -40px rgba(47, 58, 44, 0.5),
      0 12px 32px -16px rgba(47, 58, 44, 0.25);
    position: relative; overflow: hidden;
  }
  .cta-card::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(200,118,90,0.18), transparent 60%);
    transform: translate(40%, -40%);
  }
  .cta-eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(243, 239, 232, 0.55);
    margin-bottom: 20px;
  }
  .cta h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(36px, 4.5vw, 56px); line-height: 1.05; letter-spacing: -0.02em;
    margin-bottom: 16px; text-wrap: balance;
  }
  .cta h3 em { font-style: italic; color: var(--warm); }
  .cta-sub {
    font-size: 16px; color: rgba(243, 239, 232, 0.7); line-height: 1.5;
    max-width: 480px; margin: 0 auto 36px;
  }
  .cta-btn {
    display: inline-flex; align-items: center; gap: 14px;
    background: var(--bg-card);
    color: var(--accent);
    padding: 20px 36px;
    border-radius: 6px;
    font-family: var(--sans); font-weight: 500; font-size: 17px;
    letter-spacing: -0.005em;
    text-decoration: none;
    border: none; cursor: pointer;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 12px 28px -12px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 18px 36px -12px rgba(0,0,0,0.5);
  }
  .cta-btn .arrow {
    width: 22px; height: 22px;
    background: var(--accent); color: var(--bg-card);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .cta-meta {
    margin-top: 28px;
    display: flex; gap: 32px; justify-content: center;
    font-family: var(--mono); font-size: 11px;
    color: rgba(243, 239, 232, 0.55); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .cta-meta span { display: flex; align-items: center; gap: 6px; }
  .cta-meta span::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: rgba(243,239,232,0.4); }

  /* ---- Footer ---- */
  footer {
    padding: 40px 0 60px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--mono); font-size: 11px; color: var(--ink-mute);
    letter-spacing: 0.06em;
  }

  /* ---- Responsive ---- */
  @media (max-width: 880px) {
    .hero-grid, .results-grid, .testi-grid { grid-template-columns: 1fr; gap: 40px; }
    .cal-grid { grid-template-columns: 1fr; }
    .stat-card { min-height: 200px; }
    .section-head h2 { max-width: 100%; }
    .section-head { flex-direction: column; align-items: flex-start; gap: 16px; }
    .wa-card { transform: none; margin: 0 auto; }
    .time-saved { grid-template-columns: 1fr; gap: 16px; }
    .time-saved .quote-mark { font-size: 48px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="tweaks-panel.js"></script>
<script src="app.js"></script>
</body>
</html>
